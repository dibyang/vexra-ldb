  dependsOn tasks.named('ldbBlockLocalIndexBaselineReport')
  dependsOn tasks.named('ldbBlockLocalIndexCandidateReport')
}

tasks.register('longRunTest', JavaExec) {
  group = 'verification'
  description = 'Runs the explicit local long-run smoke profile; not part of default test.'
  dependsOn tasks.named('classes')
  classpath = sourceSets.main.runtimeClasspath
  mainClass = 'net.xdob.vexra.ldb.longrun.LongRunMain'
  def duration = providers.gradleProperty('ldb.longrun.durationMinutes')
      .map { "${it}m" }
      .orElse(providers.gradleProperty('ldb.longrun.duration').orElse('30s'))
  def outputDir = providers.gradleProperty('ldb.longrun.outputDir')
      .orElse(layout.buildDirectory.dir('reports/ldb-longrun/longrun-work').map { it.asFile.path })
  def seed = providers.gradleProperty('ldb.longrun.seed').orElse('20260613')
  args 'run', '--config', 'smoke', '--run.duration', duration.get(),
      '--run.workDir', outputDir.get(), '--run.seed', seed.get()
}


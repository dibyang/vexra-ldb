name: CI

on:
  push:
    branches:
      - master
      - main
      - 'v*'
  pull_request:
    branches:
      - master
      - main
      - 'v*'

jobs:
  test:
    name: Test on JDK 8 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gradle-command: ./gradlew
          - os: windows-latest
            gradle-command: .\gradlew.bat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Run clean tests
        run: ${{ matrix.gradle-command }} clean test

  publish-local:
    name: Verify local Maven publication
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Publish to Maven local
        run: ./gradlew clean publishToMavenLocal
